# Test, build and publish meridian-commander to PyPI.
#
# Publishing uses PyPI "trusted publishing" (OIDC) -- see PUBLISHING.md for
# the one-time PyPI-side setup. The publish job runs on version tags
# (v1.2.3) or when the workflow is dispatched manually from the Actions tab;
# ordinary pushes and pull requests just run the test suite and a build.

name: publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  # Publish on: a version tag, a manual dispatch, or a push to main whose
  # commit message contains "[release]" (lets a release be cut by merging a
  # PR with that marker in the squash title). Re-publishing an existing
  # version fails safely on the PyPI side.
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/v') ||
        (github.ref == 'refs/heads/main' &&
         contains(github.event.head_commit.message, '[release]'))
      ))
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
